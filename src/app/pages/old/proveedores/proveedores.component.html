<div class="proveedores-page">
<!-- Breadcrumb -->
<div class="breadcrumb">
  <span class="breadcrumb-icon"><i class="pi pi-shopping-cart"></i></span>
  <span class="breadcrumb-separator">
    <i class="pi pi-chevron-right"></i>
  </span>
  <span class="breadcrumb-item">Todos los productos</span>
  <span class="breadcrumb-separator">
    <i class="pi pi-chevron-right"></i>
  </span>
  <span class="breadcrumb-item muted">Proveedores</span>
</div>

<!-- Filters -->
<section class="filtros-section">
  <div class="filtros-card">
    <!-- Row 1: Favoritos toggle + Search -->
    <div class="filtros-row-1">
      <div class="filtros-left">
        <div class="toggle-favoritos">
          <img src="assets/images/proveedores/favorite-filled.svg" alt="" class="fav-icon" />
          <span class="toggle-label">Favoritos</span>
          <label class="switch">
            <input type="checkbox" [(ngModel)]="favoritos" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="search-input">
        <i class="pi pi-search search-icon"></i>
        <input type="text" placeholder="Buscar proveedor" [(ngModel)]="searchQuery" />
      </div>
    </div>

    <!-- Row 2: Dropdowns + Apply button -->
    <div class="filtros-row-2">
      <div class="select-group">
        <label class="select-label">Tipo de proveedor</label>
        <div class="select-wrapper">
          <select [(ngModel)]="tipoProveedor">
            <option *ngFor="let t of tiposProveedor" [value]="t">{{ t }}</option>
          </select>
          <i class="pi pi-chevron-down select-icon"></i>
        </div>
      </div>

      <div class="filtros-divider"></div>

      <div class="select-group">
        <label class="select-label">Ciudad</label>
        <div class="select-wrapper">
          <select [(ngModel)]="ciudad">
            <option *ngFor="let c of ciudades" [value]="c">{{ c }}</option>
          </select>
          <i class="pi pi-chevron-down select-icon"></i>
        </div>
      </div>

      <div class="filtros-divider"></div>

      <div class="select-group">
        <label class="select-label">Categorías</label>
        <div class="select-wrapper">
          <select [(ngModel)]="categoria">
            <option *ngFor="let c of categorias" [value]="c">{{ c }}</option>
          </select>
          <i class="pi pi-chevron-down select-icon"></i>
        </div>
      </div>

      <button class="btn-aplicar-filtros" (click)="aplicarFiltros()">
        <i class="pi pi-sliders-h"></i>
        <span>Aplicar filtros</span>
      </button>
    </div>
  </div>
</section>

<!-- Provider Grid -->
<section class="proveedores-grid">
  <div
    class="proveedor-card"
    *ngFor="let prov of filteredProveedores; let i = index"
    [style.animation-delay]="i * 30 + 'ms'"
  >
    <!-- Avatar -->
    <div class="card-avatar-area">
      <div class="card-avatar" [class.has-image]="prov.imageUrl">
        <img *ngIf="prov.imageUrl" [src]="prov.imageUrl" [alt]="prov.name" />
        <span *ngIf="!prov.imageUrl" class="avatar-initials">{{ getInitials(prov.name) }}</span>
      </div>
      <!-- Badge: premium or verified -->
      <div class="badge-premium" *ngIf="prov.badge === 'premium'">
        <img src="assets/images/proveedores/premium-badge.svg" alt="Premium" />
      </div>
      <div class="badge-verified" *ngIf="prov.badge === 'verified'">
        <img src="assets/images/proveedores/verified-badge.svg" alt="Verificado" />
      </div>
    </div>

    <!-- Info -->
    <div class="card-info">
      <p class="card-name">{{ prov.name }}</p>
      <p class="card-count">{{ prov.productsCount }} productos</p>
      <p class="card-categories">{{ prov.categories }}</p>
    </div>

    <!-- Favorite button -->
    <button class="card-favorite" (click)="toggleFavorite(prov)">
      <img
        [src]="prov.isFavorite ? 'assets/images/proveedores/favorite-filled.svg' : 'assets/images/proveedores/favorite-outline.svg'"
        alt="Favorito"
      />
    </button>
  </div>
</section>

<!-- Loading indicator -->
<div class="loading-indicator">
  <div class="loading-pill">
    <i class="pi pi-spin pi-spinner"></i>
    <span>Cargando proveedores...</span>
  </div>
</div>
</div>

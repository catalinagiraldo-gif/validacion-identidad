<div class="report-dash">
  <nav class="report-dash__breadcrumbs" aria-label="Breadcrumb">
    <a routerLink="/gali-v5" class="report-dash__crumb"><i class="pi pi-home"></i></a>
    <i class="pi pi-chevron-right report-dash__crumb-sep"></i>
    <span class="report-dash__crumb">{{ breadcrumbs[0] }}</span>
    <i class="pi pi-chevron-right report-dash__crumb-sep"></i>
    <span class="report-dash__crumb report-dash__crumb--active">{{ breadcrumbs[1] }}</span>
  </nav>

  <h1 class="report-dash__title">Dashboard</h1>

  <div class="report-dash__toolbar">
    <div class="report-dash__toolbar-left">
      <button type="button" class="report-dash__btn-outline">Exportar</button>
      <button type="button" class="report-dash__btn-outline">Actualizar</button>
    </div>
    <div class="report-dash__search">
      <i class="pi pi-search"></i>
      <input type="search" placeholder="Buscar pedido…" [(ngModel)]="searchQuery" />
    </div>
  </div>

  <div class="report-dash__table-scroll">
    <table class="report-dash-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha</th>
          <th>Cliente</th>
          <th>Producto</th>
          <th>Ciudad</th>
          <th>Transportadora</th>
          <th>Estado</th>
          <th>Monto</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows">
          <td>{{ r.id }}</td>
          <td>{{ r.fecha }}</td>
          <td>{{ r.cliente }}</td>
          <td>{{ r.producto }}</td>
          <td>{{ r.ciudad }}</td>
          <td>{{ r.transportadora }}</td>
          <td><span class="report-dash-table__tag">{{ r.estado }}</span></td>
          <td>{{ r.monto }}</td>
          <td>
            <div class="report-dash-table__actions">
              <button type="button" title="Ver"><i class="pi pi-eye"></i></button>
              <button type="button" title="Editar"><i class="pi pi-user-edit"></i></button>
              <button type="button" title="Eliminar"><i class="pi pi-trash"></i></button>
              <button type="button" title="Ticket"><i class="pi pi-ticket"></i></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="report-dash__pagination">
    <button type="button" class="report-dash__page-btn"><i class="pi pi-angle-double-left"></i></button>
    <button type="button" class="report-dash__page-btn report-dash__page-btn--active">1</button>
    <button type="button" class="report-dash__page-btn"><i class="pi pi-angle-double-right"></i></button>
  </div>
</div>

<aside class="sb" aria-label="Navegación Dropi">
  <nav class="sb__group">
    <ul>
      <li *ngFor="let it of itemsOperacion">
        <a
          class="sb__item"
          [routerLink]="it.ruta"
          [routerLinkActive]="'sb__item--active'"
          [routerLinkActiveOptions]="{ exact: !!it.exact }"
          [attr.aria-label]="it.label"
          [title]="it.label">
          <span class="sb__item-icon">
            <ng-container [ngSwitch]="it.icon">
              <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 9v11h5v-7h4v7h5V9"/></svg>
              <svg *ngSwitchCase="'catalogo'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              <svg *ngSwitchCase="'pedidos'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3h2l3 14h13"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M6 8h15l-1.5 7H8"/></svg>
              <svg *ngSwitchCase="'integraciones'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 9V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/><path d="M15 15v4a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2v-4"/><path d="M9 9h6"/><path d="M9 15h6"/><path d="M3 12h6"/><path d="M15 12h6"/></svg>
              <svg *ngSwitchCase="'landings'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
              <svg *ngSwitchCase="'cartera'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9H5a2 2 0 0 1 0-4h12v4"/><circle cx="16" cy="14" r="1.4"/></svg>
              <svg *ngSwitchCase="'metricas'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 3 5-7"/></svg>
              <svg *ngSwitchCase="'soporte'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9 10a3 3 0 0 1 6 0c0 2-3 2-3 4"/><circle cx="12" cy="17" r="0.5"/></svg>
              <svg *ngSwitchCase="'config'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              <svg *ngSwitchCase="'academy'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c3 2 9 2 12 0v-5"/></svg>
              <svg *ngSwitchCase="'proyectos'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 12l9 4 9-4"/><path d="M3 17l9 4 9-4"/></svg>
              <svg *ngSwitchCase="'vistas'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </ng-container>
          </span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sb__divider" aria-hidden="true"></div>

  <nav class="sb__group sb__group--gali" aria-label="Espacio Gali">
    <ul>
      <li *ngFor="let it of itemsGali">
        <a
          class="sb__item sb__item--gali"
          [routerLink]="it.ruta"
          [routerLinkActive]="'sb__item--active'"
          [attr.aria-label]="'Gali ' + it.label"
          [title]="it.label">
          <span class="sb__item-mark" aria-hidden="true">✦</span>
          <span class="sb__item-icon">
            <ng-container [ngSwitch]="it.icon">
              <svg *ngSwitchCase="'objetivo'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/></svg>
              <svg *ngSwitchCase="'comunidad'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.4"/><path d="M3 19c0-2.8 2.7-5 6-5s6 2.2 6 5"/><path d="M14 17c.4-1.6 2-2.5 3.5-2.5 1.6 0 3 1 3.4 2.5"/></svg>
              <svg *ngSwitchCase="'stack'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/><path d="M3 17l9 5 9-5"/></svg>
              <svg *ngSwitchCase="'constructor'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/></svg>
              <svg *ngSwitchCase="'proyectos'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 12l9 4 9-4"/></svg>
              <svg *ngSwitchCase="'vistas'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            </ng-container>
          </span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sb__spacer"></div>

  <nav class="sb__group sb__group--foot" aria-label="Ajustes">
    <ul>
      <li *ngFor="let it of itemsFooter">
        <a
          class="sb__item"
          [routerLink]="it.ruta"
          [routerLinkActive]="'sb__item--active'"
          [attr.aria-label]="it.label"
          [title]="it.label">
          <span class="sb__item-icon">
            <ng-container [ngSwitch]="it.icon">
              <svg *ngSwitchCase="'academy'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c3 2 9 2 12 0v-5"/></svg>
              <svg *ngSwitchCase="'soporte'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9 10a3 3 0 0 1 6 0c0 2-3 2-3 4"/><circle cx="12" cy="17" r="0.5"/></svg>
              <svg *ngSwitchCase="'config'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
            </ng-container>
          </span>
        </a>
      </li>
    </ul>
  </nav>
</aside>
